<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Audio Button</title>
    <style>
        /* This makes the button look nice and centers it on the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }

        .audio-button {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .audio-button:hover {
            background-color: #218838;
            transform: scale(1.05);
        }

        .audio-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <button class="audio-button" onclick="playAudio()">🎵 Click to Play Sound</button>

    <audio id="myAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>

</body>
</html>
